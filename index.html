<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0d0f1a" />
  <title>PG Contact Directory</title>
  <meta name="description" content="PG Contact Directory – Quickly find and contact your PG via call or WhatsApp." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f1a;
      --surface:   #161829;
      --card:      #1e2235;
      --card-hover:#252a40;
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --green:     #25D366;
      --blue:      #3b82f6;
      --text:      #e8eaf6;
      --muted:     #8890b0;
      --border:    rgba(108,99,255,0.2);
      --shadow:    0 8px 32px rgba(0,0,0,0.4);
      --glow:      0 0 20px rgba(108,99,255,0.25);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    /* ─── Base ────────────────────────────── */
    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 14px env(safe-area-inset-bottom, 80px);
      padding-bottom: max(80px, env(safe-area-inset-bottom));
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(167,139,250,0.08) 0%, transparent 60%);
      overflow-x: hidden;
    }

    /* ─── Header ─────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 28px;
      width: 100%;
    }
    .logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin-bottom: 12px;
      box-shadow: var(--glow);
    }
    header h1 {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent2), #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { color: var(--muted); font-size: 0.9rem; margin-top: 5px; }

    /* ─── Form Card ──────────────────────── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px 20px;
      width: 100%;
      max-width: 540px;
      margin-bottom: 28px;
      box-shadow: var(--shadow);
    }
    .form-card h2 {
      font-size: 1rem; font-weight: 600; color: var(--accent2);
      margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
    }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block; font-size: 0.82rem; color: var(--muted);
      margin-bottom: 6px; font-weight: 500;
    }
    .form-group input,
    .form-group textarea {
      width: 100%; background: var(--card);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      /* 16px prevents iOS zoom on focus */
      padding: 13px 14px; color: var(--text);
      font-family: 'Outfit', sans-serif; font-size: 16px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--muted); opacity: 0.65; }
    .form-group textarea { resize: vertical; min-height: 76px; }

    .btn-add {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-family: 'Outfit', sans-serif;
      font-size: 1rem; font-weight: 600; border: none;
      border-radius: var(--radius-md); cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 4px;
      /* Good tap target */
      min-height: 50px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-add:active { opacity: 0.85; transform: scale(0.98); }

    /* ─── Section Title ──────────────────── */
    .section-title {
      color: var(--muted); max-width: 540px; width: 100%;
      letter-spacing: 0.5px; text-transform: uppercase;
      font-size: 0.75rem; font-weight: 600; margin-bottom: 12px;
    }

    /* ─── PG List ────────────────────────── */
    .pg-list {
      width: 100%; max-width: 540px;
      display: flex; flex-direction: column; gap: 14px;
    }

    /* ─── PG Card ────────────────────────── */
    .pg-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 16px 0 16px;
      box-shadow: var(--shadow);
      transition: background 0.2s, box-shadow 0.2s;
      animation: fadeSlideIn 0.3s ease both;
      position: relative;
      overflow: hidden;
    }
    .pg-card.contacted {
      border-color: rgba(37,211,102,0.35);
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Card Top Row ───────────────────── */
    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding-bottom: 14px;
      padding-right: 32px; /* space for delete btn */
    }

    .pg-avatar {
      width: 46px; height: 46px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 700; color: #fff;
      flex-shrink: 0; text-transform: uppercase;
      box-shadow: 0 3px 10px rgba(108,99,255,0.35);
      transition: background 0.3s;
    }
    .pg-card.contacted .pg-avatar {
      background: linear-gradient(135deg, #25D366, #16a34a);
      box-shadow: 0 3px 10px rgba(37,211,102,0.35);
    }

    .pg-info { flex: 1; min-width: 0; }
    .pg-name {
      font-size: 1rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .pg-phone { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

    /* Contacted Badge */
    .contacted-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(37,211,102,0.15);
      color: #4ade80;
      border: 1px solid rgba(37,211,102,0.3);
      border-radius: 20px; padding: 2px 9px;
      font-size: 0.72rem; font-weight: 600;
      margin-top: 5px; letter-spacing: 0.3px;
      animation: badgePop 0.3s cubic-bezier(.175,.885,.32,1.275) both;
    }
    @keyframes badgePop {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ─── Action Buttons ─────────────────── */
    .pg-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .action-btn {
      width: 46px; height: 46px;
      border-radius: var(--radius-sm);
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.1rem; text-decoration: none;
      transition: transform 0.15s, filter 0.15s;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:active { transform: scale(0.9); filter: brightness(0.9); }

    .btn-call {
      background: linear-gradient(135deg, var(--blue), #60a5fa);
      color: #fff; box-shadow: 0 3px 12px rgba(59,130,246,0.4);
    }
    .btn-whatsapp {
      background: linear-gradient(135deg, var(--green), #34d399);
      color: #fff; box-shadow: 0 3px 12px rgba(37,211,102,0.4);
    }

    /* ─── Note Section ───────────────────── */
    .note-section {
      border-top: 1px solid var(--border);
      padding: 12px 0 14px 0;
    }
    .note-label {
      font-size: 0.73rem; color: var(--muted);
      font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 7px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .note-edit-btn {
      background: none; border: none; cursor: pointer;
      color: var(--accent2); font-size: 0.75rem;
      display: flex; align-items: center; gap: 4px;
      font-family: 'Outfit', sans-serif;
      padding: 4px 8px; border-radius: 6px;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
      min-height: 32px; /* tap target */
    }
    .note-edit-btn:active { background: rgba(108,99,255,0.2); }

    .note-text {
      font-size: 0.85rem; color: var(--accent2);
      font-style: italic; line-height: 1.5;
    }
    .note-empty {
      font-size: 0.82rem; color: var(--muted);
      font-style: italic; opacity: 0.55;
    }

    /* Inline Note Editor */
    .note-editor { display: none; flex-direction: column; gap: 8px; }
    .note-editor.open { display: flex; }
    .note-editor textarea {
      width: 100%; background: var(--bg);
      border: 1px solid var(--accent); border-radius: 8px;
      padding: 10px 12px; color: var(--text);
      font-family: 'Outfit', sans-serif; font-size: 16px;
      outline: none; resize: vertical; min-height: 70px;
      -webkit-appearance: none;
    }
    .note-editor-btns { display: flex; gap: 8px; }
    .btn-save-note, .btn-cancel-note {
      flex: 1; padding: 10px 0; border-radius: 9px;
      font-family: 'Outfit', sans-serif; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; border: none;
      min-height: 44px; -webkit-tap-highlight-color: transparent;
    }
    .btn-save-note {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .btn-cancel-note {
      background: rgba(255,255,255,0.07); color: var(--muted);
    }
    .btn-cancel-note:active { background: rgba(255,255,255,0.12); }

    /* ─── Delete Button ──────────────────── */
    .btn-delete {
      position: absolute; top: 12px; right: 12px;
      background: rgba(255,80,80,0.1); color: #ff6b6b;
      border: none; width: 30px; height: 30px;
      border-radius: 8px; cursor: pointer; font-size: 0.78rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-delete:active { background: rgba(255,80,80,0.3); }

    /* ─── Empty State ────────────────────── */
    .empty-state {
      text-align: center; color: var(--muted);
      padding: 40px 20px; width: 100%; max-width: 540px;
    }
    .empty-state i { font-size: 2.2rem; margin-bottom: 12px; opacity: 0.35; display: block; }
    .empty-state p { font-size: 0.92rem; line-height: 1.6; }

    /* ─── Tooltips (desktop only) ─────────── */
    @media (hover: hover) {
      [data-tip] { position: relative; }
      [data-tip]::after {
        content: attr(data-tip);
        position: absolute; bottom: calc(100% + 8px); left: 50%;
        transform: translateX(-50%);
        background: #2a2d42; color: var(--text);
        font-size: 0.7rem; white-space: nowrap;
        padding: 4px 8px; border-radius: 6px;
        opacity: 0; pointer-events: none; transition: opacity 0.2s;
      }
      [data-tip]:hover::after { opacity: 1; }
      .action-btn:hover { transform: scale(1.1); filter: brightness(1.12); }
      .btn-add:hover { opacity: 0.9; transform: translateY(-1px); }
    }

    /* ─── Tablet & Desktop ───────────────── */
    @media (min-width: 540px) {
      body { padding: 40px 20px 80px; }
      .form-card { padding: 28px 30px; }
      .form-group input,
      .form-group textarea,
      .note-editor textarea { font-size: 0.95rem; }
      .card-top { padding-right: 38px; }
      .pg-actions { flex-direction: row; align-items: center; }
      .pg-avatar { width: 50px; height: 50px; font-size: 1.2rem; }
      header h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">&#127968;</div>
    <h1>PG Contact Directory</h1>
    <p>Add PGs and reach them instantly</p>
  </header>

  <!-- Add Form -->
  <div class="form-card">
    <h2><i class="fa-solid fa-plus-circle"></i> Add New PG</h2>

    <div class="form-group">
      <label for="pg-name">PG Name *</label>
      <input type="text" id="pg-name" placeholder="e.g. Sunshine PG, Royal Boys PG"
             maxlength="60" autocomplete="off" />
    </div>

    <div class="form-group">
      <label for="pg-phone">Phone Number (country code + number, no +) *</label>
      <input type="tel" id="pg-phone" placeholder="e.g. 919876543210"
             inputmode="numeric" autocomplete="tel" />
    </div>

    <div class="form-group">
      <label for="pg-note">Special Note <span style="color:var(--muted);font-weight:400">(optional)</span></label>
      <textarea id="pg-note"
        placeholder="e.g. AC room, meals included, ground floor, Rs. 6000/mo..."></textarea>
    </div>

    <button class="btn-add" id="btn-add-pg" onclick="addPG()">
      <i class="fa-solid fa-plus"></i>&nbsp; Add PG Contact
    </button>
  </div>

  <div class="section-title" id="list-header" style="display:none">Saved PG Contacts</div>
  <div class="pg-list" id="pg-list"></div>

  <div class="empty-state" id="empty-state">
    <i class="fa-solid fa-house-circle-xmark"></i>
    <p>No PG contacts yet.<br/>Fill in the form above to add one!</p>
  </div>

  <script>
    const KEY = 'pg_contacts_v1';
    let contacts = JSON.parse(localStorage.getItem(KEY) || '[]');

    function save() { localStorage.setItem(KEY, JSON.stringify(contacts)); }

    function initials(name) {
      return name.trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
    }
    function sanitizePhone(raw) { return raw.replace(/[\s\-\+\(\)]/g, ''); }
    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // ── Mark Contacted when WhatsApp clicked ──
    function markContacted(idx) {
      contacts[idx].contacted = true;
      save();
      const card = document.getElementById('pg-card-' + idx);
      if (card) {
        card.classList.add('contacted');
        const ba = document.getElementById('badge-area-' + idx);
        if (ba && !ba.querySelector('.contacted-badge')) {
          ba.innerHTML = '<span class="contacted-badge"><i class="fa-solid fa-circle-check"></i> Contacted</span>';
        }
      }
    }

    // ── Note editing ──
    function openNoteEditor(idx) {
      document.getElementById('note-display-' + idx).style.display = 'none';
      const editor = document.getElementById('note-editor-' + idx);
      editor.classList.add('open');
      const ta = document.getElementById('note-ta-' + idx);
      ta.value = contacts[idx].note || '';
      setTimeout(function() { ta.focus(); }, 50);
    }
    function cancelNote(idx) {
      document.getElementById('note-display-' + idx).style.display = 'block';
      document.getElementById('note-editor-' + idx).classList.remove('open');
    }
    function saveNote(idx) {
      const ta = document.getElementById('note-ta-' + idx);
      contacts[idx].note = ta.value.trim();
      save();
      const noteContent = document.getElementById('note-content-' + idx);
      if (contacts[idx].note) {
        noteContent.innerHTML = '<span class="note-text"><i class="fa-solid fa-note-sticky" style="font-size:0.7rem;margin-right:5px;opacity:0.7"></i>' + escHtml(contacts[idx].note) + '</span>';
      } else {
        noteContent.innerHTML = '<span class="note-empty">No note yet. Tap edit to add one.</span>';
      }
      cancelNote(idx);
      showToast('Note updated!', 'success');
    }

    // ── Render All ──
    function renderAll() {
      const list   = document.getElementById('pg-list');
      const empty  = document.getElementById('empty-state');
      const header = document.getElementById('list-header');
      list.innerHTML = '';

      if (contacts.length === 0) {
        empty.style.display = 'block';
        header.style.display = 'none';
        return;
      }
      empty.style.display = 'none';
      header.style.display = 'block';

      contacts.forEach(function(c, idx) {
        const phone   = sanitizePhone(c.phone);
        const waLink  = 'https://wa.me/' + phone;
        const telLink = 'tel:+' + phone;

        const card = document.createElement('div');
        card.className = 'pg-card' + (c.contacted ? ' contacted' : '');
        card.id = 'pg-card-' + idx;

        const avatarStyle = c.contacted
          ? 'style="background:linear-gradient(135deg,#25D366,#16a34a);box-shadow:0 3px 10px rgba(37,211,102,0.35)"'
          : '';
        const badgeHtml = c.contacted
          ? '<span class="contacted-badge"><i class="fa-solid fa-circle-check"></i> Contacted</span>'
          : '';
        const noteHtml = c.note
          ? '<span class="note-text"><i class="fa-solid fa-note-sticky" style="font-size:0.7rem;margin-right:5px;opacity:0.7"></i>' + escHtml(c.note) + '</span>'
          : '<span class="note-empty">No note yet. Tap edit to add one.</span>';

        card.innerHTML =
          '<button class="btn-delete" onclick="deletePG(' + idx + ')" aria-label="Delete"><i class="fa-solid fa-xmark"></i></button>' +

          '<div class="card-top">' +
            '<div class="pg-avatar" ' + avatarStyle + '>' + initials(c.name) + '</div>' +
            '<div class="pg-info">' +
              '<div class="pg-name">' + escHtml(c.name) + '</div>' +
              '<div class="pg-phone"><i class="fa-solid fa-phone" style="font-size:0.7rem;margin-right:4px;opacity:0.5"></i>' + escHtml(c.phone) + '</div>' +
              '<div id="badge-area-' + idx + '">' + badgeHtml + '</div>' +
            '</div>' +
            '<div class="pg-actions">' +
              '<a href="' + telLink + '" class="action-btn btn-call" data-tip="Call" aria-label="Call">' +
                '<i class="fa-solid fa-phone"></i>' +
              '</a>' +
              '<a href="' + waLink + '" target="_blank" rel="noopener noreferrer" class="action-btn btn-whatsapp" data-tip="WhatsApp" aria-label="WhatsApp" onclick="markContacted(' + idx + ')">' +
                '<i class="fa-brands fa-whatsapp"></i>' +
              '</a>' +
            '</div>' +
          '</div>' +

          '<div class="note-section">' +
            '<div class="note-label">' +
              '<span><i class="fa-solid fa-note-sticky" style="margin-right:5px;opacity:0.6"></i>Special Note</span>' +
              '<button class="note-edit-btn" onclick="openNoteEditor(' + idx + ')"><i class="fa-solid fa-pen-to-square"></i> Edit</button>' +
            '</div>' +
            '<div id="note-display-' + idx + '">' +
              '<div id="note-content-' + idx + '">' + noteHtml + '</div>' +
            '</div>' +
            '<div class="note-editor" id="note-editor-' + idx + '">' +
              '<textarea id="note-ta-' + idx + '" placeholder="Add a note about this PG..." inputmode="text"></textarea>' +
              '<div class="note-editor-btns">' +
                '<button class="btn-save-note" onclick="saveNote(' + idx + ')"><i class="fa-solid fa-check"></i> Save</button>' +
                '<button class="btn-cancel-note" onclick="cancelNote(' + idx + ')">Cancel</button>' +
              '</div>' +
            '</div>' +
          '</div>';

        list.appendChild(card);
      });
    }

    // ── Add PG ──
    function addPG() {
      const name  = document.getElementById('pg-name').value.trim();
      const phone = document.getElementById('pg-phone').value.trim();
      const note  = document.getElementById('pg-note').value.trim();

      if (!name) { shake('pg-name'); showToast('Please enter the PG name!', 'error'); return; }

      const clean = sanitizePhone(phone);
      if (!clean || !/^\d{7,15}$/.test(clean)) {
        shake('pg-phone');
        showToast('Enter a valid phone number (7-15 digits)!', 'error');
        return;
      }

      contacts.unshift({ name, phone: clean, note, contacted: false });
      save();
      renderAll();

      document.getElementById('pg-name').value  = '';
      document.getElementById('pg-phone').value = '';
      document.getElementById('pg-note').value  = '';
      document.getElementById('pg-name').blur();

      showToast(name + ' added!', 'success');
    }

    // ── Delete ──
    function deletePG(idx) {
      const name = contacts[idx].name;
      contacts.splice(idx, 1);
      save(); renderAll();
      showToast(name + ' removed.', 'info');
    }

    // ── Shake ──
    function shake(id) {
      const el = document.getElementById(id);
      el.style.animation = 'none';
      void el.offsetHeight;
      el.style.animation = 'shake 0.35s ease';
      el.addEventListener('animationend', function() { el.style.animation = ''; }, { once: true });
    }

    // ── Toast ──
    function showToast(msg, type) {
      const ex = document.getElementById('_toast');
      if (ex) ex.remove();
      const colors = {
        success: 'linear-gradient(135deg,#22c55e,#16a34a)',
        error:   'linear-gradient(135deg,#ef4444,#dc2626)',
        info:    'linear-gradient(135deg,#6c63ff,#a78bfa)'
      };
      const t = document.createElement('div');
      t.id = '_toast';
      t.textContent = msg;
      Object.assign(t.style, {
        position:'fixed', bottom:'24px', left:'50%',
        transform:'translateX(-50%) translateY(16px)',
        background: colors[type] || colors.info,
        color:'#fff', padding:'11px 22px', borderRadius:'50px',
        fontFamily:'Outfit,sans-serif', fontWeight:'500',
        fontSize:'0.88rem',
        boxShadow:'0 6px 20px rgba(0,0,0,0.4)',
        zIndex:'9999', opacity:'0',
        transition:'opacity 0.3s,transform 0.3s',
        whiteSpace:'nowrap',
        maxWidth: 'calc(100vw - 40px)',
        textAlign: 'center'
      });
      document.body.appendChild(t);
      requestAnimationFrame(function() {
        t.style.opacity = '1';
        t.style.transform = 'translateX(-50%) translateY(0)';
      });
      setTimeout(function() {
        t.style.opacity = '0';
        t.style.transform = 'translateX(-50%) translateY(16px)';
        setTimeout(function() { t.remove(); }, 350);
      }, 2600);
    }

    // ── Inject keyframes ──
    const s = document.createElement('style');
    s.textContent = '@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}';
    document.head.appendChild(s);

    // Enter key (not in textarea)
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') addPG();
    });

    renderAll();
  </script>
</body>
</html>
